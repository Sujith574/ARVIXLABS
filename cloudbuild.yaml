steps:
  # ── Backend ────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/arvix-backend', '-f', 'backend/Dockerfile', './backend']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/arvix-backend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - arvix-backend
      - '--image=gcr.io/$PROJECT_ID/arvix-backend'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=FIREBASE_PROJECT_ID=$PROJECT_ID'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,SECRET_KEY=SECRET_KEY:latest,ADMIN_USERNAME=ADMIN_USERNAME:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest'

  # ── Frontend ───────────────────────────────────────────────────────────────
  # Baking in the backend URL at build time for high performance and low cost
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - build 
      - '-t'
      - 'gcr.io/$PROJECT_ID/arvix-frontend'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://arvix-backend-dmypaoadja-uc.a.run.app'
      - '-f'
      - 'frontend/Dockerfile'
      - './frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/arvix-frontend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - arvix-frontend
      - '--image=gcr.io/$PROJECT_ID/arvix-frontend'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'

images:
  - 'gcr.io/$PROJECT_ID/arvix-backend'
  - 'gcr.io/$PROJECT_ID/arvix-frontend'

options:
  logging: CLOUD_LOGGING_ONLY
